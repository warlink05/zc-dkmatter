<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Score Calculator</title>

<style>
body{
    font-family: Arial, sans-serif;
    padding:20px;
}

.group{
    margin-bottom:25px;
}

.counter{
    display:inline-flex;
    align-items:center;
    gap:10px;
    margin-top:5px;
}

button.step{
    width:34px;
    height:34px;
    font-size:18px;
    font-weight:bold;
}

button:disabled{
    opacity:0.4;
}

.value{
    min-width:30px;
    text-align:center;
    font-weight:bold;
    font-size:18px;
}

.subtotal{
    margin-top:5px;
    font-weight:bold;
}

.total{
    font-size:26px;
    font-weight:bold;
    margin-top:20px;
}

.remaining{
    font-size:20px;
    margin-top:5px;
}

.progress{
    width:100%;
    height:22px;
    background:#ddd;
    border-radius:6px;
    overflow:hidden;
    margin-top:10px;
}

.progress-bar{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#4caf50,#8bc34a);
    transition:width .3s;
}

.message{
    margin-top:15px;
    font-size:20px;
    font-weight:bold;
    color:green;
}

button.reset{
    margin-top:15px;
    padding:8px 16px;
    font-size:16px;
}
</style>
</head>

<body>

<h2>Score Calculator</h2>

<div class="group">
<h3>Group A (max 5, +3 each)</h3>
<div class="counter">
<button id="minus-groupA" class="step" onclick="changeValue('groupA',-1)">−</button>
<span id="valA" class="value">0</span>
<button id="plus-groupA" class="step" onclick="changeValue('groupA',1)">+</button>
</div>
<div class="subtotal">
Subtotal: <span id="subA">0</span> |
Remaining: <span id="remA">15</span>
</div>
</div>

<div class="group">
<h3>Group B (max 5, +5 each)</h3>
<div class="counter">
<button id="minus-groupB" class="step" onclick="changeValue('groupB',-1)">−</button>
<span id="valB" class="value">0</span>
<button id="plus-groupB" class="step" onclick="changeValue('groupB',1)">+</button>
</div>
<div class="subtotal">
Subtotal: <span id="subB">0</span> |
Remaining: <span id="remB">25</span>
</div>
</div>

<div class="group">
<h3>Group C (max 4, +7 each)</h3>
<div class="counter">
<button id="minus-groupC" class="step" onclick="changeValue('groupC',-1)">−</button>
<span id="valC" class="value">0</span>
<button id="plus-groupC" class="step" onclick="changeValue('groupC',1)">+</button>
</div>
<div class="subtotal">
Subtotal: <span id="subC">0</span> |
Remaining: <span id="remC">28</span>
</div>
</div>

<div class="group">
<h3>Group D (max 1, +10 each)</h3>
<div class="counter">
<button id="minus-groupD" class="step" onclick="changeValue('groupD',-1)">−</button>
<span id="valD" class="value">0</span>
<button id="plus-groupD" class="step" onclick="changeValue('groupD',1)">+</button>
</div>
<div class="subtotal">
Subtotal: <span id="subD">0</span> |
Remaining: <span id="remD">10</span>
</div>
</div>

<div class="total">
Total: <span id="total">0</span>
</div>

<div class="remaining">
Remaining: <span id="remaining">50</span>
</div>

<div class="progress">
<div id="progressBar" class="progress-bar"></div>
</div>

<div id="message" class="message"></div>

<button class="reset" onclick="resetAll()">Reset</button>

<script>

const MAX_TOTAL = 50;

const groups = {
groupA:{max:5,value:3,val:"valA",sub:"subA",rem:"remA"},
groupB:{max:5,value:5,val:"valB",sub:"subB",rem:"remB"},
groupC:{max:4,value:7,val:"valC",sub:"subC",rem:"remC"},
groupD:{max:1,value:10,val:"valD",sub:"subD",rem:"remD"}
};

let values = JSON.parse(localStorage.getItem("scoreValues")) || {
groupA:0,
groupB:0,
groupC:0,
groupD:0
};

function save(){
localStorage.setItem("scoreValues",JSON.stringify(values));
}

function updateButtons(group){

const val=values[group];
const max=groups[group].max;

document.getElementById("minus-"+group).disabled = val<=0;
document.getElementById("plus-"+group).disabled = val>=max;

}

function changeValue(group,delta){

let newVal=values[group]+delta;

if(newVal<0) newVal=0;
if(newVal>groups[group].max) newVal=groups[group].max;

values[group]=newVal;

document.getElementById(groups[group].val).textContent=newVal;

updateButtons(group);

save();

calculateTotal();
}

function calculateTotal(){

let total=0;

for(const group in groups){

const count=values[group];
const value=groups[group].value;
const max=groups[group].max;

const subtotal=count*value;
const remaining=(max-count)*value;

document.getElementById(groups[group].sub).textContent=subtotal;
document.getElementById(groups[group].rem).textContent=remaining;

total+=subtotal;

updateButtons(group);
}

document.getElementById("total").textContent=total;

let remainingTotal=MAX_TOTAL-total;
if(remainingTotal<0) remainingTotal=0;

document.getElementById("remaining").textContent=remainingTotal;

let percent=(total/MAX_TOTAL)*100;
if(percent>100) percent=100;

document.getElementById("progressBar").style.width=percent+"%";

updateMessage(total);
}

function updateMessage(total){

let msg="";

if(total>=50){
msg="Seed is done!";
}
else if(total>=20){
msg="Super Smith Weapon Available!";
}

document.getElementById("message").textContent=msg;
}

function resetAll(){

values={
groupA:0,
groupB:0,
groupC:0,
groupD:0
};

save();

for(const group in groups){

document.getElementById(groups[group].val).textContent=0;
document.getElementById(groups[group].sub).textContent=0;

document.getElementById(groups[group].rem)
.textContent=groups[group].max*groups[group].value;

updateButtons(group);
}

document.getElementById("total").textContent=0;
document.getElementById("remaining").textContent=50;
document.getElementById("progressBar").style.width="0%";
document.getElementById("message").textContent="";
}

function init(){

for(const group in groups){

document.getElementById(groups[group].val).textContent=values[group];

updateButtons(group);
}

calculateTotal();
}

init();

</script>

</body>
</html>
